<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Totall Hub CFO - Monday</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Totall Propriedade Intelectual">
        <img src="/totall-logo.png" alt="Totall Propriedade Intelectual" />
      </a>
      <div class="board-meta">
        <span id="connectionStatus">Conectando ao Monday...</span>
        <a href="https://totall.monday.com/boards/18421402809" target="_blank" rel="noreferrer">Abrir board</a>
      </div>
    </header>

    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">Hub CFO</p>
          <h1>Demandas conectadas ao Monday</h1>
        </div>
      </section>

      <nav class="tabs" aria-label="Areas do painel">
        <button class="tab is-active" type="button" data-tab="request">Solicitacao</button>
        <button class="tab" type="button" data-tab="reports">Relatorios</button>
      </nav>

      <section class="tab-panel is-active" id="requestPanel">
        <form class="quick-form" id="quickForm">
          <div class="form-head">
            <p class="eyebrow">Novo elemento</p>
            <h2>Adicionar demanda em ATIVIDADES</h2>
          </div>

          <label class="wide">
            Titulo da demanda
            <input id="requestName" name="name" required maxlength="180" placeholder="Ex.: Revisar fluxo financeiro do projeto X" />
          </label>

          <label>
            Tipo
            <select name="type">
              <option>Atividade</option>
              <option>Projeto</option>
            </select>
          </label>

          <label>
            Status inicial
            <select name="status">
              <option>Em progresso</option>
              <option>Parado</option>
              <option>Stand by</option>
            </select>
          </label>

          <label>
            Prazo
            <input name="dueDate" type="date" />
          </label>

          <label>
            Responsavel pela demanda (R)
            <select name="responsibleId" id="responsibleSelect" required>
              <option value="">Carregando usuarios...</option>
            </select>
          </label>

          <label class="wide">
            Observacao inicial
            <textarea name="note" rows="5" placeholder="Contexto, responsaveis, criterio de sucesso ou proximo passo."></textarea>
          </label>

          <div class="actions wide">
            <p id="quickStatus" role="status"></p>
            <button class="primary" type="submit">Criar no Monday</button>
          </div>
        </form>
      </section>

      <section class="tab-panel" id="reportsPanel">
        <div class="report-toolbar">
          <label>
            Buscar
            <input id="reportSearchInput" placeholder="Titulo, status, responsavel ou grupo" />
          </label>
          <label>
            Status
            <select id="reportStatusFilter">
              <option value="">Todos</option>
              <option>Em progresso</option>
              <option>Parado</option>
              <option>Stand by</option>
              <option>Feito</option>
            </select>
          </label>
          <button class="secondary" type="button" id="refreshButton">Atualizar</button>
        </div>

        <div class="report-grid" id="reportGrid" aria-live="polite"></div>
        <div class="report-table-card">
          <div class="report-card-head">
            <p class="eyebrow">Demandas</p>
            <h2>Visao consolidada</h2>
          </div>
          <div class="report-table-wrap">
            <table class="report-table">
              <thead>
                <tr>
                  <th>Demanda</th>
                  <th>Status</th>
                  <th>Responsavel</th>
                  <th>Prazo</th>
                  <th>Grupo</th>
                </tr>
              </thead>
              <tbody id="reportTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
